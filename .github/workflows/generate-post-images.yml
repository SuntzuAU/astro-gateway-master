name: Generate Post Images

on:
  workflow_dispatch:
    inputs:
      post_slug:
        description: 'Post filename (e.g. 2026-03-04-my-post.md) - leave blank for most recent'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find target post
        id: find_post
        run: |
          if [ -n "${{ github.event.inputs.post_slug }}" ]; then
            POST_FILE="src/content/news/${{ github.event.inputs.post_slug }}"
          else
            POST_FILE=$(ls src/content/news/*.md | sort | tail -1)
          fi
          echo "post_file=$POST_FILE" >> $GITHUB_OUTPUT
          echo "Target post: $POST_FILE"

      - name: Check if images already exist
        id: check_images
        run: |
          POST_FILE="${{ steps.find_post.outputs.post_file }}"
          if grep -q "^heroImage:" "$POST_FILE"; then
            echo "Images already exist - skipping generation"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No images found - proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract post metadata
        id: metadata
        if: steps.check_images.outputs.skip == 'false'
        run: |
          POST_FILE="${{ steps.find_post.outputs.post_file }}"
          TITLE=$(grep "^title:" "$POST_FILE" | head -1 | sed 's/title: //' | tr -d '"')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Build image prompts
        id: prompts
        if: steps.check_images.outputs.skip == 'false'
        run: |
          python3 << 'PYEOF'
          import random, os

          title = os.environ.get("TITLE", "professional document software")

          # -------------------------------------------------------
          # SITE-SPECIFIC POOLS - update these when cloning
          # -------------------------------------------------------

          settings = [
            "Australian government office interior",
            "modern real estate agency office Sydney",
            "legal chambers and law firm office",
            "corporate boardroom Melbourne",
            "hospital administration office",
            "university administration building",
            "local council chamber interior",
            "professional services firm open plan office",
          ]

          hero_compositions = [
            "two professionals reviewing a document on screen together",
            "person looking over colleagues shoulder at laptop screen",
            "presenter at projector screen showing document to seated team",
            "real estate agent showing property contracts to client across desk",
            "person looking frustrated at large pile of paperwork on desk",
            "person looking relieved and happy at computer screen solution found",
            "executive signing important contract documents at boardroom table",
            "small team collaborating around printed documents and laptop",
          ]

          break_compositions = [
            "close up of hands on laptop keyboard reviewing document",
            "PDF document on modern desk with hand resting on it",
            "stack of paper documents beside laptop showing clean digital screen",
            "signed contract on desk with pen beside it",
            "property listing documents spread across meeting table",
            "filing cabinet open with folders representing old paper system",
            "close up of document on screen sharp focus shallow depth of field",
            "empty professional boardroom table with documents ready for meeting",
          ]

          lighting = [
            "warm natural window light",
            "cool professional office lighting",
            "golden afternoon light through office windows",
            "bright modern workspace lighting",
            "soft diffused overcast light",
          ]

          style = "photorealistic photography, Canon 5D quality, no infographics, no diagrams, no charts, no text overlays, no illustrations, no clipart, no UI mockups"

          # Build hero prompt
          s = random.choice(settings)
          c = random.choice(hero_compositions)
          l = random.choice(lighting)
          hero = f"{c}, {s}, {l}, context: {title}, {style}"

          # Build break1 prompt - different setting and composition to hero
          s2 = random.choice([x for x in settings if x != s])
          c2 = random.choice(break_compositions)
          l2 = random.choice([x for x in lighting if x != l])
          break1 = f"{c2}, {s2}, {l2}, {style}"

          # Build break2 prompt - different again
          s3 = random.choice([x for x in settings if x != s and x != s2])
          c3 = random.choice([x for x in break_compositions if x != c2])
          l3 = random.choice(lighting)
          break2 = f"{c3}, {s3}, {l3}, {style}"

          # Write to GitHub outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"hero={hero}\n")
            f.write(f"break1={break1}\n")
            f.write(f"break2={break2}\n")

          print(f"Hero: {hero}")
          print(f"Break1: {break1}")
          print(f"Break2: {break2}")
          PYEOF
        env:
          TITLE: ${{ steps.metadata.outputs.title }}

      - name: Generate hero image
        id: hero
        if: steps.check_images.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.IMAGE_WORKER_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": \"${{ steps.prompts.outputs.hero }}\", \"name\": \"hero\"}")
          KEY=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['r2']['key'])" 2>/dev/null)
          if [ -z "$KEY" ]; then echo "ERROR: Hero failed. Response: $RESPONSE"; exit 1; fi
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Generate break image 1
        id: break1
        if: steps.check_images.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.IMAGE_WORKER_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": \"${{ steps.prompts.outputs.break1 }}\", \"name\": \"break1\"}")
          KEY=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['r2']['key'])" 2>/dev/null)
          if [ -z "$KEY" ]; then echo "ERROR: Break1 failed. Response: $RESPONSE"; exit 1; fi
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Generate break image 2
        id: break2
        if: steps.check_images.outputs.skip == 'false'
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.IMAGE_WORKER_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\": \"${{ steps.prompts.outputs.break2 }}\", \"name\": \"break2\"}")
          KEY=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['r2']['key'])" 2>/dev/null)
          if [ -z "$KEY" ]; then echo "ERROR: Break2 failed. Response: $RESPONSE"; exit 1; fi
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Update post frontmatter
        if: steps.check_images.outputs.skip == 'false'
        env:
          POST_FILE: ${{ steps.find_post.outputs.post_file }}
          HERO: ${{ steps.hero.outputs.key }}
          BREAK1: ${{ steps.break1.outputs.key }}
          BREAK2: ${{ steps.break2.outputs.key }}
        run: |
          python3 << 'PYEOF'
          import re, os
          post_file = os.environ["POST_FILE"]
          hero = os.environ["HERO"]
          break1 = os.environ["BREAK1"]
          break2 = os.environ["BREAK2"]
          with open(post_file, "r") as f:
              content = f.read()
          image_block = f'heroImage: "{hero}"\nbreakImage1: "{break1}"\nbreakImage2: "{break2}"\n'
          content = re.sub(r'(metaDescription:.*\n)', r'\1' + image_block, content, count=1)
          with open(post_file, "w") as f:
              f.write(content)
          print("Done")
          PYEOF

      - name: Commit updated post
        if: steps.check_images.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/news/
          git commit -m "Add generated images to ${{ steps.find_post.outputs.post_file }}"
          git push
