name: Generate Images + Build Site

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      single_prompt:
        description: "Generate one image — enter the prompt here (leave blank to process all)"
        required: false
      single_name:
        description: "SEO name for the image (e.g. tungsten-pdf-legal-firms)"
        required: false
      single_key:
        description: "Key to store it under in the manifest (e.g. hero, blog-post-1)"
        required: false

concurrency:
  group: generate-images
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate all images
        env:
          IMAGE_WORKER_URL: https://master-image-generator.speech-recognition-cloud.workers.dev/generate
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          R2_PUBLIC_BASE: ${{ vars.R2_PUBLIC_BASE }}
          SITE_ID: ${{ vars.SITE_ID }}
        run: node generate-images.js

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/image-manifest.json public/generated || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image manifest [skip ci]"
          git pull --rebase origin main
          git push

      - name: Build Astro site
        env:
          R2_PUBLIC_BASE: ${{ vars.R2_PUBLIC_BASE }}
        run: npm run build
