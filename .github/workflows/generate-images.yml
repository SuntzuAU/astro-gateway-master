name: Generate Images + Build Site

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Force regenerate all images (ignore cache)"
        required: false
        default: "false"

concurrency:
  group: generate-images
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate images via Worker
        env:
          IMAGE_WORKER_URL: https://master-image-generator.speech-recognition-cloud.workers.dev/generate
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          SITE_ID: ${{ vars.SITE_ID || 'speechrecognition-cloud' }}
        run: node generate-images.js

      - name: Commit manifest + any downloaded images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/image-manifest.json public/generated || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image manifest [skip ci]"
          git push

      - name: Build Astro site
        run: npm run build
